<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
.visual-area{height:220px;display:flex;align-items:center;justify-content:center;position:relative;background:var(--vis);margin:0 20px;border-radius:20px;overflow:hidden;flex-shrink:0;}
.orb-scene{position:relative;width:190px;height:200px;display:flex;align-items:center;justify-content:center;}
.a-orb{width:76px;height:76px;border-radius:50%;background:var(--teal);position:relative;z-index:2;box-shadow:0 4px 20px rgba(30,111,122,.32);}
.dg-layer{position:absolute;bottom:4px;left:0;width:190px;height:56px;pointer-events:none;}
.beat-section{padding:8px 20px 0;text-align:center;}
.bdots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:20px;}
.bdot{width:10px;height:10px;border-radius:50%;background:var(--sand2);}
.bdot.in{background:var(--terra);}
.bdot.out{background:var(--teal);}
.phase-lbl{font-size:11px;color:var(--ink3);letter-spacing:.1em;margin-top:5px;min-height:16px;}
.phase-lbl.in{color:var(--terra);}
.phase-lbl.out{color:var(--teal);}
.progress-lbl{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--ink3);margin-top:3px;min-height:20px;}
.count-row{display:flex;gap:8px;padding:10px 20px 0;}
.count-block{flex:1;background:var(--sand);border-radius:12px;padding:10px 8px;text-align:center;}
.count-lbl{font-size:11px;color:var(--ink3);margin-bottom:7px;}
.count-ctrl{display:flex;align-items:center;justify-content:center;gap:8px;}
.cnt-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--sand2);background:var(--cream);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);-webkit-appearance:none;touch-action:manipulation;}
.cnt-btn:active{background:var(--teal-l);border-color:var(--teal);}
.cnt-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--ink);min-width:32px;text-align:center;}
.cnt-sub{font-size:10px;color:var(--ink3);margin-top:3px;}
.bpm-row{display:flex;align-items:center;gap:10px;padding:10px 20px 0;}
.bpm-rlbl{font-size:12px;color:var(--ink3);flex-shrink:0;}
.bpm-rnum{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--ink);min-width:38px;text-align:right;flex-shrink:0;}
.bpm-rslider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--teal) 50%,var(--sand2) 50%);}
.bpm-rslider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;background:var(--teal);border-radius:50%;box-shadow:0 2px 6px rgba(30,111,122,.35);}
.prac-section{padding:10px 20px 0;}
.prac-opts{display:flex;gap:6px;}
.prac-opt{flex:1;border:1.5px solid var(--sand2);background:var(--cream);border-radius:8px;padding:10px 2px;font-size:12px;font-family:'Noto Serif JP',serif;color:var(--ink2);cursor:pointer;text-align:center;-webkit-appearance:none;touch-action:manipulation;}
.prac-opt.active{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d);font-weight:500;}
.sec-label{padding:10px 24px 7px;font-size:11px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;}
.sound-row{display:flex;gap:8px;padding:0 20px;}
.snd{flex:1;border:1.5px solid var(--sand2);background:var(--cream);border-radius:9px;padding:10px 2px;font-size:12px;font-family:'Noto Serif JP',serif;color:var(--ink2);cursor:pointer;text-align:center;-webkit-appearance:none;touch-action:manipulation;}
.snd.active{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d);font-weight:500;}
.snd-sub{font-size:10px;color:var(--ink3);display:block;margin-top:3px;}
.bpm-full-area{text-align:center;padding:14px 24px 0;}
.bpm-fn{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;color:var(--ink);line-height:1;}
.bpm-fu{font-size:12px;color:var(--ink3);letter-spacing:.08em;display:block;margin-top:3px;}
.slider-wrap{padding:10px 24px 0;}
input.full-slider{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--teal) 50%,var(--sand2) 50%);}
input.full-slider::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;background:var(--teal);border-radius:50%;box-shadow:0 2px 8px rgba(30,111,122,.35);}
.bpm-labels{display:flex;justify-content:space-between;padding:5px 24px 0;font-size:11px;color:var(--ink3);}
.play-wrap{padding:14px 20px 0;}
/* Wake Lock インジケーター */
.wakelock-badge{display:none;margin:8px 20px 0;background:var(--teal-l);border-radius:8px;padding:6px 12px;font-size:10px;color:var(--teal-d);text-align:center;}
.wakelock-badge.show{display:block;}
</style>

<script src="assets/common.js"></script>
<script>
'use strict';

// ── 状態 ──
var bpmP=60,bpmO=60,mode='pendulum',sound='deep',playing=false;
var countsIn=5,countsOut=5,pracVal=5;
var currentPhase='in',beatInPhase=0,currentRound=0,cycleCount=0;
var breathingType='normal'; // 'normal' | 'nadi'
var beatTimer=null,pendRight=false,startTime=null;
var pendTimeVal=0,pendTimerInterval=null; // 振り子の練習時間（0=なし）

// ── Wake Lock ──
var wakeLock=null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    wakeLock=await navigator.wakeLock.request('screen');
    document.getElementById('wakelock-badge').classList.add('show');
    wakeLock.addEventListener('release',function(){
      document.getElementById('wakelock-badge').classList.remove('show');
    });
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
  document.getElementById('wakelock-badge').classList.remove('show');
}
// 画面復帰時に再取得
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&playing)requestWakeLock();
});

// ── AudioContext ──
var AC=window.AudioContext||window.webkitAudioContext;
var ctx=null;
function initAudio(){
  if(!ctx)ctx=new AC();
  // iOSはユーザー操作と同タイミングで無音バッファを再生しないと音がブロックされる
  try{
    var buf=ctx.createBuffer(1,1,ctx.sampleRate);
    var src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
  }catch(e){}
  ctx.resume();
}
function playSound(){
  if(!ctx)return;
  try{
    var t=ctx.currentTime;
    if(sound==='wood'){
      var len=Math.ceil(ctx.sampleRate*.08);
      var buf=ctx.createBuffer(1,len,ctx.sampleRate);
      var d=buf.getChannelData(0);
      for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,12)*.9;
      var s=ctx.createBufferSource();s.buffer=buf;
      var f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=1100;f.Q.value=4;
      var g=ctx.createGain();g.gain.value=1.2;
      s.connect(f);f.connect(g);g.connect(ctx.destination);s.start(t);
    }else if(sound==='deep'){
      var o1=ctx.createOscillator(),o2=ctx.createOscillator();
      var g=ctx.createGain(),g2=ctx.createGain();
      o1.type='sine';o1.frequency.value=180;
      o2.type='sine';o2.frequency.value=360;g2.gain.value=.25;
      o1.connect(g);o2.connect(g2);g2.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.2,t+.012);
      g.gain.exponentialRampToValueAtTime(.001,t+.65);
      o1.start(t);o1.stop(t+1);o2.start(t);o2.stop(t+1);
    }else{
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=1320;
      g.gain.setValueAtTime(.16,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.65);
      o.start(t);o.stop(t+1);
    }
  }catch(e){}
}

// ── 振り子 ──
function swingPendulum(){
  pendRight=!pendRight;
  document.getElementById('pend-group').style.transform='rotate('+(pendRight?32:-32)+'deg)';
  playSound();
}

// ── Orb ──
function resetOrbInstant(){
  var orb=document.getElementById('a-orb'),dg=document.getElementById('a-dg');
  orb.style.transition='none';dg.style.transition='none';
  orb.style.transform='scale(0.6)';orb.style.backgroundColor='#1E6F7A';
  orb.style.boxShadow='0 4px 20px rgba(30,111,122,.32)';
  dg.style.transform='translateY(0)';
  void orb.offsetWidth;
}
function startPhase(phase){
  var counts=(phase==='in')?countsIn:countsOut;
  var dur=(counts*60000/bpmO/1000).toFixed(2)+'s';
  var orb=document.getElementById('a-orb'),dg=document.getElementById('a-dg');
  orb.style.transition='transform '+dur+' ease-in-out,background-color '+dur+' ease-in-out,box-shadow '+dur+' ease-in-out';
  dg.style.transition='transform '+dur+' ease-in-out';
  if(phase==='in'){
    orb.style.transform='scale(1.42)';orb.style.backgroundColor='#C4602A';
    orb.style.boxShadow='0 6px 28px rgba(196,96,42,.4)';dg.style.transform='translateY(12px)';
  }else{
    orb.style.transform='scale(0.6)';orb.style.backgroundColor='#1E6F7A';
    orb.style.boxShadow='0 4px 20px rgba(30,111,122,.32)';dg.style.transform='translateY(-6px)';
  }
  var lbl=document.getElementById('phase-lbl');
  lbl.textContent=(phase==='in')?'吸　う':'吐　く';
  lbl.className='phase-lbl '+phase;
  renderDots(phase,0);
}
function renderDots(phase,filled){
  var counts=(phase==='in')?countsIn:countsOut,c=document.getElementById('bdots');
  c.innerHTML='';
  for(var i=0;i<counts;i++){
    var d=document.createElement('div');
    d.className='bdot'+(i<filled?' '+phase:'');c.appendChild(d);
  }
}
function updateProgress(){
  document.getElementById('progress-lbl').textContent='Round '+(currentRound+1)+' / '+pracVal;
}
function onBeat(){
  beatInPhase++;playSound();
  var counts=(currentPhase==='in')?countsIn:countsOut;
  renderDots(currentPhase,beatInPhase);
  updateProgress();
  if(beatInPhase>=counts){
    beatInPhase=0;
    if(currentPhase==='in'){
      currentPhase='out';
    } else {
      currentPhase='in';
      if(breathingType==='nadi'){
        cycleCount++;
        if(cycleCount>=2){ cycleCount=0; currentRound++; }
      } else {
        currentRound++;
      }
      if(currentRound>=pracVal){completePractice();return;}
    }
    startPhase(currentPhase);
  }
}
function startPractice(){
  stopTimer();resetOrbInstant();
  currentPhase='in';beatInPhase=0;currentRound=0;cycleCount=0;startTime=Date.now();
  document.getElementById('beat-section').style.display='block';
  document.getElementById('progress-lbl').textContent='';
  document.getElementById('phase-lbl').textContent='';
  setTimeout(function(){startPhase('in');beatTimer=setInterval(onBeat,60000/bpmO);},100);
}
function stopTimer(){
  if(beatTimer){clearInterval(beatTimer);beatTimer=null;}
  if(pendTimerInterval){clearInterval(pendTimerInterval);pendTimerInterval=null;}
}
function completePractice(){
  stopTimer();playing=false;releaseWakeLock();
  var btn=document.getElementById('play-btn');btn.classList.remove('stop');
  document.getElementById('play-icon').textContent='▶';
  document.getElementById('play-txt').textContent='スタート';
  document.getElementById('phase-lbl').textContent='完了';
  document.getElementById('phase-lbl').className='phase-lbl out';
  document.getElementById('progress-lbl').textContent='お疲れ様でした🌿';
  var orb=document.getElementById('a-orb');
  orb.style.transition='transform .8s ease-out,background-color .8s ease-out';
  orb.style.transform='scale(1)';orb.style.backgroundColor='#1E6F7A';
}

// ── 振り子タイマー ──
function startPendTimer(){
  startTime=Date.now();
  var lbl=document.getElementById('pend-timer-lbl');
  lbl.textContent='';
  pendTimerInterval=setInterval(function(){
    if(!playing){clearInterval(pendTimerInterval);pendTimerInterval=null;return;}
    var rem=Math.max(0,pendTimeVal*60000-(Date.now()-startTime));
    var m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    lbl.textContent='残り '+m+':'+(s<10?'0':'')+s;
    if(rem<=0){
      stopTimer();playing=false;releaseWakeLock();
      var btn=document.getElementById('play-btn');
      btn.classList.remove('stop');
      document.getElementById('play-icon').textContent='▶';
      document.getElementById('play-txt').textContent='スタート';
      document.getElementById('pend-group').style.transform='rotate(0deg)';
      lbl.textContent='お疲れ様でした🌿';
    }
  },500);
}

// ── プレイボタン ──
var playBtn=document.getElementById('play-btn');
function handlePlayStart(){
  var btn=document.getElementById('play-btn');
  if(!playing){
    // ① iOSオーディオ解除（ユーザー操作の同期処理内で実行）
    initAudio();
    // ② UIを即座に更新（反応している感を出す）
    playing=true;
    btn.classList.add('stop');
    document.getElementById('play-icon').textContent='⏹';
    document.getElementById('play-txt').textContent='ストップ';
    requestWakeLock();
    // ③ 音声エンジン起動（resume()完了を待つため少し遅らせる）
    setTimeout(function(){
      if(!playing)return;
      if(mode==='pendulum'){
        var dur=Math.min((60000/bpmP)*.82/1000,1.1).toFixed(2)+'s';
        document.getElementById('pend-group').style.transitionDuration=dur;
        pendRight=false;swingPendulum();
        beatTimer=setInterval(swingPendulum,60000/bpmP);
        if(pendTimeVal>0)startPendTimer();
      }else{
        startPractice();
      }
    },80);
  }else{
    playing=false;
    btn.classList.remove('stop');
    document.getElementById('play-icon').textContent='▶';
    document.getElementById('play-txt').textContent='スタート';
    stopTimer();releaseWakeLock();
    if(mode==='pendulum'){
      document.getElementById('pend-group').style.transform='rotate(0deg)';
      document.getElementById('pend-timer-lbl').textContent='';
    }
  }
}
playBtn.addEventListener('touchstart',function(e){e.preventDefault();handlePlayStart();},{passive:false});
playBtn.addEventListener('click',function(){if(!('ontouchstart' in window))handlePlayStart();});

// ── モード切替 ──
function setMode(m){
  mode=m;
  if(playing){playing=false;stopTimer();releaseWakeLock();
    var btn=document.getElementById('play-btn');btn.classList.remove('stop');
    document.getElementById('play-icon').textContent='▶';document.getElementById('play-txt').textContent='スタート';
  }
  document.getElementById('btn-pendulum').classList.toggle('active',m==='pendulum');
  document.getElementById('btn-orb').classList.toggle('active',m==='orb');
  document.getElementById('pend-view').style.display=m==='pendulum'?'block':'none';
  var ov=document.getElementById('orb-view');ov.style.display=m==='orb'?'flex':'none';
  document.getElementById('pend-ctrls').style.display=m==='pendulum'?'block':'none';
  document.getElementById('orb-ctrls').style.display=m==='orb'?'block':'none';
  document.getElementById('beat-section').style.display='none';
  if(m==='pendulum')document.getElementById('pend-group').style.transform='rotate(0deg)';
}
document.getElementById('btn-pendulum').addEventListener('click',function(){setMode('pendulum');});
document.getElementById('btn-orb').addEventListener('click',function(){setMode('orb');});

// ── BPMスライダー ──
function updateSliderBg(el,val,max){el.style.background='linear-gradient(to right,#1E6F7A 0%,#1E6F7A '+(val/max*100)+'%,#E8E0D4 '+(val/max*100)+'%)';}
document.getElementById('bpm-p-slider').addEventListener('input',function(){
  bpmP=parseInt(this.value);document.getElementById('bpm-p-num').textContent=bpmP;
  updateSliderBg(this,bpmP,120);
  if(playing&&mode==='pendulum'){stopTimer();beatTimer=setInterval(swingPendulum,60000/bpmP);}
});
document.getElementById('bpm-o-slider').addEventListener('input',function(){
  bpmO=parseInt(this.value);document.getElementById('bpm-o-num').textContent=bpmO;
  updateSliderBg(this,bpmO,120);
});
updateSliderBg(document.getElementById('bpm-p-slider'),60,120);
updateSliderBg(document.getElementById('bpm-o-slider'),60,120);

// ── カウントボタン ──
document.getElementById('in-minus').addEventListener('click',function(){if(!playing){countsIn=Math.max(1,countsIn-1);document.getElementById('in-val').textContent=countsIn;}});
document.getElementById('in-plus').addEventListener('click',function(){if(!playing){countsIn=Math.min(30,countsIn+1);document.getElementById('in-val').textContent=countsIn;}});
document.getElementById('out-minus').addEventListener('click',function(){if(!playing){countsOut=Math.max(1,countsOut-1);document.getElementById('out-val').textContent=countsOut;}});
document.getElementById('out-plus').addEventListener('click',function(){if(!playing){countsOut=Math.min(30,countsOut+1);document.getElementById('out-val').textContent=countsOut;}});

// ── サウンドボタン ──
function setSound(s){sound=s;document.querySelectorAll('.snd').forEach(function(b){b.classList.toggle('active',b.dataset.sound===s);});}
document.querySelectorAll('.snd').forEach(function(btn){btn.addEventListener('click',function(){setSound(this.dataset.sound);});});

// ── 振り子の練習時間 ──
document.querySelectorAll('#pend-time-opts .prac-opt').forEach(function(btn){
  btn.addEventListener('click',function(){
    pendTimeVal=parseInt(this.dataset.val);
    document.querySelectorAll('#pend-time-opts .prac-opt').forEach(function(b){b.classList.remove('active');});

    document.getElementById('pend-timer-lbl').textContent='';
  });
});

// ── 呼吸ガイドのラウンド数 ──
document.querySelectorAll('#round-opts .prac-opt').forEach(function(btn){
  btn.addEventListener('click',function(){
    pracVal=parseInt(this.dataset.val);
    document.querySelectorAll('#round-opts .prac-opt').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
  });
});

// ── 呼吸タイプ切替 ──
document.getElementById('type-normal').addEventListener('click',function(){
  breathingType='normal';
  this.classList.add('active');document.getElementById('type-nadi').classList.remove('active');
});
document.getElementById('type-nadi').addEventListener('click',function(){
  breathingType='nadi';
  this.classList.add('active');document.getElementById('type-normal').classList.remove('active');
});

// ライブラリから来た場合はBPM・拍数を自動セット
(function(){
  var p=new URLSearchParams(location.search);
  if(p.get('mode')==='orb'){
    setMode('orb');
    if(p.get('bpm'))   {bpmO=parseInt(p.get('bpm'));document.getElementById('bpm-o-num').textContent=bpmO;document.getElementById('bpm-o-slider').value=bpmO;updateSliderBg(document.getElementById('bpm-o-slider'),bpmO,120);}
    if(p.get('in'))    {countsIn=parseInt(p.get('in'));document.getElementById('in-val').textContent=countsIn;}
    if(p.get('out'))   {countsOut=parseInt(p.get('out'));document.getElementById('out-val').textContent=countsOut;}
  }
})();

initNav('practice');
